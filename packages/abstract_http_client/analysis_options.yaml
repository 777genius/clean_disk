include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "test/**"

linter:
  rules:
    public_member_api_docs: true
    lines_longer_than_80_chars: false
    # Vendored package keeps narrow ignore comments for debug-only branches.
    document_ignores: false
    # Intentionally disabled - single-method interfaces are valid design patterns
    one_member_abstracts: false
    # Disabled for tests - cascades reduce readability in test assertions
    cascade_invocations: false
